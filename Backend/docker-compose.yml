version: '3.8'

services:
  # Database: MongoDB
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Cache: Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # Node.js Backend
  backend-node:
    build: ./backend-node
    environment:
      - MONGO_URI=mongodb+srv://TravelGoUser:Gotravel123@lakshmi.5668b.mongodb.net/?appName=lakshmi
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mysecretkey
      - PORT=5000
    depends_on:
      - mongodb
      - redis

  # Django Backend
  backend-django:
    build: ./backend-django
    environment:
      - DEBUG=True
    depends_on:
      - mongodb

  # React Frontend
  frontend:
    build: ./frontend
    depends_on:
      - backend-node
      - backend-django

  # Reverse Proxy: Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend-node
      - backend-django

volumes:
  mongo_data: